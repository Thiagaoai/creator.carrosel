services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/live').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - caddy=hermes.dockplusai.com
      - caddy.reverse_proxy={{upstreams 8000}}

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info -c 4
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: lucaslorentz/caddy-docker-proxy:latest
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    environment:
      - CADDY_INGRESS_NETWORKS=carousel-autoposter_default

volumes:
  redis_data:
  caddy_data:
